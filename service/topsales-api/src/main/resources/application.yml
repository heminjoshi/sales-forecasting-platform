spring:
  application:
    name: topsales-api
  profiles:
    default: local

  # Local stack from local/docker-compose.yml (Postgres 16). Overridden by the `aws` profile (designed).
  datasource:
    url: jdbc:postgresql://localhost:5432/topsales
    username: topsales
    password: topsales
  # Flyway owns the schema; migrations ship on the classpath from topsales-common (db/migration).
  flyway:
    enabled: true
    locations: classpath:db/migration
  # Redis-backed read cache (Phase 4). Lettuce connects lazily, so the app boots with Redis down and
  # the CacheShell fails open to the serving table / DB. Provisioned by local/docker-compose.yml.
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 500ms          # short: a slow/dead cache must not slow reads — fail open quickly
  # Omit nulls (intervals/confidence are absent in actuals/pending responses).
  jackson:
    default-property-inclusion: non_null

server:
  port: 8080

# Central application config (docs/lld.md §10) — the single place every tweakable read-side variable
# lives, bound into TopsalesProperties. Cache values are placeholders until Phase 4 (Redis).
topsales:
  # Read/serving endpoint: the dashboard's k choices + the request-param defaults (parsed via the
  # enums' from(...), so the string values are case-insensitive on the wire).
  read:
    k-default: 10
    k-min: 1
    k-max: 50
    k-options: [5, 7, 10]
    window-default: month
    mode-default: forecast
    channel-default: all
  # Trailing window length in calendar days, by window.
  window-days:
    week: 7
    month: 30
    year: 365
  # Forecast knobs (Phase 3). The batch (topsales-forecast) has its own application.yml that mirrors
  # these; kept here too so the whole topsales.* tree binds consistently in the api.
  forecast:
    freshness-slo: 36h
    history-days: 730
    serving-top-n: 50          # ranked rows written per serving pk (K_max)
    version-keep: 3            # serving versions retained for rollback
    holt-winters:
      alpha: 0.3
      beta: 0.1
      gamma: 0.3
      season-length: 7
    interval:
      z: 1.28                  # ~80% prediction interval
      confidence-high-max: 0.15
      confidence-medium-max: 0.40
    eval:
      initial-train-days: 84
      test-horizon-days: 7
      step-days: 7
      max-folds: 12
      wape-dense-max: 0.20
      wape-sparse-min: 0.40
  # Read-cache knobs (docs/lld.md §7). base-ttl ± jitter-pct% spreads expiry to avoid lock-step
  # stampedes; lock-ttl bounds the single-flight lease so a crashed leader can't wedge a hot key.
  cache:
    base-ttl: 15m
    jitter-pct: 20
    lock-ttl: 2s
  # GenAI insight (Phase 5). provider selects the InsightGenerator impl: 'template' is the
  # deterministic local floor; 'bedrock' is the designed cloud impl (model-id is read only by it).
  # timeout bounds a generation call before falling back to the template, so a slow model never
  # stalls a read.
  insight:
    enabled: true
    provider: template          # 'template' (local floor) | 'bedrock' (designed)
    model-id: anthropic.claude-haiku-4-5   # Bedrock id; only read by the Bedrock impl
    timeout: 1500ms
  rawlog:
    dir: ./data/rawlog       # local S3 stand-in for the immutable raw event log
