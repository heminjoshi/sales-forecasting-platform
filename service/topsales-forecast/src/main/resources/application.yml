spring:
  application:
    name: topsales-forecast
  profiles:
    default: local
  main:
    web-application-type: none      # one-shot batch (ApplicationRunner), no embedded server
    banner-mode: "off"

  # Same local Postgres as the API (local/docker-compose.yml). Reads aggregates, writes serving rows.
  datasource:
    url: jdbc:postgresql://localhost:5432/topsales
    username: topsales
    password: topsales
  flyway:
    enabled: true
    locations: classpath:db/migration
  # Phase 4: after each tenant's serving swap the batch bumps the per-tenant cache version (Redis
  # INCR) so the read cache invalidates at once (docs/lld.md §7). Lettuce connects lazily; the batch
  # still completes with Redis down (the CacheVersion bump no-ops on failure).
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 500ms

# Forecast knobs (mirrors topsales-api's application.yml; bound into TopsalesProperties).
topsales:
  window-days:
    week: 7
    month: 30
    year: 365
  forecast:
    freshness-slo: 36h
    history-days: 730
    serving-top-n: 50
    version-keep: 3
    holt-winters:
      alpha: 0.3
      beta: 0.1
      gamma: 0.3
      season-length: 7
    interval:
      z: 1.28
      confidence-high-max: 0.15
      confidence-medium-max: 0.40
    eval:
      initial-train-days: 84
      test-horizon-days: 7
      step-days: 7
      max-folds: 12
      wape-dense-max: 0.20
      wape-sparse-min: 0.40
  # GenAI insight (Phase 5). Mirrors topsales-api so the topsales.* tree binds consistently here too;
  # the batch does not generate insight, but keeping the trees in sync keeps TopsalesProperties happy.
  insight:
    enabled: true
    provider: template          # 'template' (local floor) | 'bedrock' (designed)
    model-id: anthropic.claude-haiku-4-5   # Bedrock id; only read by the Bedrock impl
    timeout: 1500ms

logging:
  level:
    root: WARN
    com.topsales.forecast: INFO
  # Surface the per-tenant MDC (set by ForecasterJob) in batch logs — same key/format as the API's
  # logback-spring.xml so tenantId shows for every line. requestId is N/A for the batch (no request).
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%X{tenantId:-} %X{requestId:-}] %logger{36} - %msg%n"
