name: infra

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CDK validation: synth the account-agnostic skeleton and run the construct
# tests (the metric-contract gate). NO AWS credentials — nothing is deployed;
# `cdk synth` with no env never calls AWS.
jobs:
  synth:
    name: cdk synth + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Install
        run: npm ci

      - name: Synth (image tag = commit SHA)
        run: npx cdk synth -c imageTag=${{ github.sha }}

      - name: Test
        run: npm test
