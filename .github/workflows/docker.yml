name: docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Build-only validation of the service images. No registry: `push: false` proves
# the Dockerfiles + reactor build are healthy without needing credentials.
jobs:
  build:
    name: build ${{ matrix.image }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [serving, forecaster, consumer]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.image }}.Dockerfile
          push: false
          tags: topsales/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
