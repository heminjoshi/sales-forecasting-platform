name: web

on:
  push:
    branches: [main]
    paths: ["web/**"]
  pull_request:
    branches: [main]
    paths: ["web/**"]

# Lightweight guard for the production SPA (web/, Vite + Recharts). Just builds
# it to catch breaks early; Vercel does the authoritative deploy build on push.
# Path-scoped to web/** — the SPA lands in the UI PR, so this stays inert (and
# green) on infra-only changes that never touch web/.
jobs:
  build:
    name: build SPA
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
