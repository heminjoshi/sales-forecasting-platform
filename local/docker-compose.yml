# Local development stack — no AWS account required.
# Postgres stands in for Aurora aggregates + the serving table; Redis for ElastiCache.
# Start with `make up`, stop with `make down`.

services:
  postgres:
    image: postgres:16
    container_name: topsales-postgres
    environment:
      POSTGRES_DB: topsales
      POSTGRES_USER: topsales
      POSTGRES_PASSWORD: topsales
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U topsales -d topsales"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    container_name: topsales-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Phase 7 (optional): a `localstack` service to exercise the cloud repository impls
  # (Kinesis / DynamoDB / S3) locally, selected by the `aws` Spring profile.

volumes:
  postgres-data:
